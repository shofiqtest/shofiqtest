<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Md Shofiqul Islam GitHub profile card</title>
  <desc id="desc">Dark neon profile card for Linux kernel, Zephyr RTOS, embedded systems, C and C++ work.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="72%" cy="18%" r="70%">
      <stop offset="0" stop-color="#123a7a" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#061328" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#020817"/>
    </radialGradient>
    <linearGradient id="cardBorder" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="nameGradient" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="buttonGradient" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.70 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#38bdf8" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" rx="28" fill="url(#bgGlow)"/>
  <rect width="1600" height="700" rx="28" fill="url(#grid)" opacity="0.55"/>
  <rect x="18" y="18" width="1564" height="664" rx="22" fill="none" stroke="url(#cardBorder)" stroke-width="2" opacity="0.82"/>

  <g opacity="0.8">
    <circle cx="72" cy="70" r="1.4" fill="#38bdf8"/>
